<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Minicourse — ProblemSolving.Works</title>
  <!-- Footer-only variant: no nav — for landing use where the footer's Terms/Privacy/LinkedIn links still matter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --bg2:      #141720;
      --bg3:      #1c2030;
      --accent:   #f5a623;
      --accent2:  #e8913a;
      --text:     #f0f2f7;
      --muted:    #8a90a4;
      --border:   #252a3a;
      --radius:   12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(13,15,20,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 16px; font-weight: 700; letter-spacing: 3px;
      line-height: 1.2; text-transform: uppercase;
      color: var(--accent); text-decoration: none;
    }

    .nav-links { display: flex; gap: 2rem; list-style: none; }

    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: 0.9rem; font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    .nav-cta {
      background: var(--accent) !important;
      color: #000 !important;
      padding: 0.45rem 1.1rem;
      border-radius: 6px;
      font-weight: 700 !important;
    }

    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 4px;
    }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; }

    /* ── SECTIONS ── */
    section { padding: 5rem 2rem; }
    .container { max-width: 1100px; margin: 0 auto; }

    .label {
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 0.6rem;
    }

    /* ── OPT-IN ── */
    .optin-page { padding: 6rem 2rem 3rem; }

    .optin-inner {
      display: grid; grid-template-columns: 1fr 1.3fr;
      gap: 4rem; align-items: center;
    }

    .optin-photo {
      aspect-ratio: 4/5; background: var(--bg3);
      border-radius: var(--radius); border: 1px solid var(--border);
      overflow: hidden; display: flex; align-items: center;
      justify-content: center; color: var(--muted); font-size: 0.85rem;
    }
    .optin-photo img { width: 100%; height: 100%; object-fit: cover; }

    .optin-copy h1 {
      font-size: clamp(1.9rem, 3.8vw, 2.8rem);
      font-weight: 800; letter-spacing: -0.03em; line-height: 1.15;
      margin-bottom: 1rem;
    }
    .optin-copy h1 em { font-style: normal; color: var(--accent); }

    .optin-copy > p {
      color: var(--muted); font-size: 0.97rem;
      line-height: 1.75; margin-bottom: 1.8rem; max-width: 480px;
    }

    /* ── FORM ── */
    .optin-form { max-width: 460px; }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block; font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 0.45rem;
    }
    .field input[type="text"],
    .field input[type="email"] {
      width: 100%; background: var(--bg3); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0.75rem 1rem; font-size: 0.95rem; font-family: inherit;
      transition: border-color 0.2s;
    }
    .field input::placeholder { color: var(--muted); }
    .field input:focus { outline: none; border-color: var(--accent); }

    .consent {
      display: flex; align-items: flex-start; gap: 0.6rem;
      margin: 1.1rem 0 1.4rem;
    }
    .consent input[type="checkbox"] {
      margin-top: 0.2rem; width: 16px; height: 16px; accent-color: var(--accent);
      flex-shrink: 0;
    }
    .consent label {
      color: var(--muted); font-size: 0.82rem; line-height: 1.55;
    }
    .consent a { color: var(--accent); text-decoration: underline; }

    .optin-submit {
      width: 100%; background: var(--accent); color: #000;
      border: none; padding: 0.9rem 2rem; border-radius: 8px;
      font-weight: 700; font-size: 0.95rem; font-family: inherit;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .optin-submit:hover { background: var(--accent2); transform: translateY(-1px); }

    /* ── FOOTER ── */
    footer {
      padding: 2.5rem 2rem; border-top: 1px solid var(--border);
      text-align: center; color: var(--muted); font-size: 0.82rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
    .foot-line { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; }
    .linkedin-link { color: #4ea3ff; display: inline-flex; transition: color 0.2s, transform 0.2s; }
    .linkedin-link:hover { color: #2f7fd1; transform: translateY(-2px); }
    footer .linkedin-link { display: inline-flex; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .hamburger { display: flex; }

      .nav-links {
        display: none; position: absolute;
        top: 100%; left: 0; right: 0;
        flex-direction: column;
        background: var(--bg); padding: 1.5rem 2rem;
        border-bottom: 1px solid var(--border); gap: 1.2rem;
      }
      .nav-links.open { display: flex; }

      .optin-inner { grid-template-columns: 1fr; gap: 2.5rem; }
      .optin-photo  { aspect-ratio: 3/2; }
    }
  </style>
