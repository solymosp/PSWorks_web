<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dots preview — walking</title>
  <style>
    body {
      background: #0d0f14;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div style="display:flex; justify-content:center; gap:10px; margin:20px 0;">
    <span class="ps-dot" style="animation-delay:0s;"></span>
    <span class="ps-dot" style="animation-delay:0.4s;"></span>
    <span class="ps-dot" style="animation-delay:0.8s;"></span>
  </div>
  <style>
    .ps-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #1a1a1f;
      display: inline-block;
      animation: ps-walk-dot 1.2s ease-in-out infinite;
    }
    @keyframes ps-walk-dot {
      0%   { background: #f5a623; }
      10%  { background: #f5a623; }
      20%  { background: #1a1a1f; }
      100% { background: #1a1a1f; }
    }
  </style>

</body>
</html>
