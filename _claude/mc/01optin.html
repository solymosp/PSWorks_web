  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0d0f14;
      --bg3:    #1c2030;
      --accent: #f5a623;
      --accent2: #e8913a;
      --text:   #f0f2f7;
      --muted:  #8a90a4;
      --border: #252a3a;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 3rem 2rem;
    }

    .container { max-width: 1000px; margin: 0 auto; width: 100%; }

    .optin-inner {
      display: grid; grid-template-columns: auto auto;
      gap: 2.7rem; align-items: center; justify-content: center;
    }

    .optin-photo {
      width: 400px; aspect-ratio: 4/5; background: var(--bg3);
      border-radius: var(--radius); border: 1px solid var(--border);
      overflow: hidden;
    }
    .optin-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 16px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
      max-width: 400px;
      margin: 0 auto 1.6rem;
    }

    /* Override MailerLite's default browser focus ring (blue) with the site accent */
    #mlb2-43583861.ml-form-embedContainer .ml-form-embedWrapper .ml-form-embedBody .ml-form-fieldRow input:focus {
      outline: none;
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 2px rgba(245, 166, 35, 0.25);
    }

    /* 7-dot walking loader, shown under the success message while waiting for redirect */
    .ps-walk-dot-7 {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #1a1a1f;
      display: inline-block;
      animation: ps-walk-7 7s linear infinite;
    }
    @keyframes ps-walk-7 {
      0%      { background: var(--accent2); }
      14.26%  { background: var(--accent2); }
      14.28%  { background: #1a1a1f; }
      100%    { background: #1a1a1f; }
    }

    @media (max-width: 768px) {
      .optin-inner { grid-template-columns: 1fr; gap: 2.5rem; }
      .optin-photo  { width: 100%; aspect-ratio: 3/2; }
    }
  </style>
